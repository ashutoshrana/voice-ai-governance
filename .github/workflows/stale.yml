name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been automatically marked as stale. It will be closed in 14 days if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale. It will be closed in 7 days if no further activity occurs.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if you would like to continue.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 14
          days-before-pr-close: 7
          stale-issue-label: "status/stale"
          stale-pr-label: "status/stale"
          exempt-issue-labels: "pinned,status/blocked,type/feature"
          exempt-pr-labels: "pinned,status/blocked"
